name: deploy-website

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true # Leverages native pnpm action caching instead

      - name: Use Node.js ${{ matrix.node-version }} 🔧
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Removed cache: 'pnpm' to prevent the workspace error

      - name: Install dependencies 🔧
        run: pnpm install

      - name: Install and Build 🔧
        run: pnpm build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .vitepress/dist
